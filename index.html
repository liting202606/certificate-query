<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合格证防伪查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px 0;
        }
        .header {
            background-color: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 0 auto;
            max-width: 600px;
            overflow: hidden;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        .logo-section {
            display: flex;
            align-items: center;
        }
        .logo {
            width: 50px;
            height: 50px;
            background-color: #ff6600;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }
        .info-text p {
            margin: 3px 0;
            color: #666;
        }
        .download-link {
            color: #1890ff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }
        .download-link:hover {
            text-decoration: underline;
        }
        .card-body {
            padding: 20px;
        }
        .item {
            margin-bottom: 25px;
        }
        .item:last-child {
            margin-bottom: 0;
        }
        .label {
            font-size: 16px;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .value {
            font-size: 18px;
            color: #000;
            line-height: 1.6;
        }
        .card-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
        }
        .card-footer a {
            color: #1890ff;
            text-decoration: none;
            font-size: 16px;
        }
        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>XX公司合格证防伪查询</h1>
    </div>
    
    <div class="card">
        <div class="card-header">
            <div class="logo-section">
                <div class="logo">LOGO</div>
                <div class="info-text">
                    <p>检验员：8438</p>
                    <p>制造日期：2026-04-30</p>
                </div>
            </div>
            <a href="这里替换成你的文件下载直链" class="download-link" target="_blank">厂检报告查看</a>
        </div>
        
        <div class="card-body">
            <div class="item">
                <div class="label">合格证编码：</div>
                <div class="value">11032600095978</div>
            </div>
            
            <div class="item">
                <div class="label">产品名称：</div>
                <div class="value">铜芯交联聚乙烯绝缘钢带铠装聚氯乙烯护套电力电缆</div>
            </div>
            
            <div class="item">
                <div class="label">产品规格：</div>
                <div class="value">N(NH)-YJV22-1KV-4x70</div>
            </div>
            
            <div class="item">
                <div class="label">检验标准：</div>
                <div class="value">GB/T12706.1-2020</div>
            </div>
            
            <div class="item">
                <div class="label">盘号：</div>
                <div class="value">26AD039910</div>
            </div>
            
            <div class="item">
                <div class="label">长度：</div>
                <div class="value">0.16KM</div>
            </div>
            
            <div class="item">
                <div class="label">工单号：</div>
                <div class="value">4500145631</div>
            </div>
            
            <div class="item">
                <div class="label">物料编码：</div>
                <div class="value">30009179</div>
            </div>
        </div>
        
        <div class="card-footer">
            <a href="http://www.yourcompany.com" target="_blank">公司官网：http://www.yourcompany.com</a>
        </div>
    </div>
</body>
</html>
